services:
  - type: web
    name: emfuleni-docs-app
    runtime: node
    plan: starter
    buildCommand: npm install --prefix server && npm install --prefix server/client && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: emfuleni-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: REQUIRE_MONGO
        value: 'true'
      - key: MONGODB_URI
        sync: false
      - key: DATA_FILE
        value: /var/data/documents.json
